# ============================================================================
# GSI Frontend — Nginx server block (produzione)
# Serve la SPA Vite compilata e fa da reverse proxy verso il backend per
# /api/ e /uploads/. Il reverse proxy pubblico (Traefik) terminerà TLS e
# inoltrerà il traffico HTTP a questo container.
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # SPA root
    root /usr/share/nginx/html;
    index index.html;

    # Logging utile in debug (stdout/stderr = docker logs)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Compressione
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff2;

    # Limiti body: il caricamento immagini passa dal frontend proxy.
    client_max_body_size 20M;

    # -------- Healthcheck interno (container) -----------------------------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # -------- API backend -------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;
    }

    # -------- File caricati (featured image) ------------------------------
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 30d;
        add_header Cache-Control "public";
    }

    # -------- OpenAPI docs (utile per il cliente, ancora dietro Traefik)
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /redoc {
        proxy_pass http://backend:8000/redoc;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # -------- Static assets fingerprintati da Vite -----------------------
    # I nomi file hanno hash (Vite): cache aggressiva, immutable.
    location ~* \.(?:js|mjs|css|woff|woff2|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # -------- SPA fallback (react-router) --------------------------------
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # -------- Hardening ---------------------------------------------------
    # File nascosti, git, env locali
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
