<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Global Shopping Insights">
  <!-- Sfondo cerchio con gradient brand -->
  <defs>
    <linearGradient id="gsi-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1677ff"/>
      <stop offset="1" stop-color="#722ed1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#gsi-grad)"/>
  <!-- Cerchio concentrico (globe) -->
  <circle cx="32" cy="32" r="18" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.9"/>
  <!-- Linee orizzontali = latitudine -->
  <ellipse cx="32" cy="32" rx="18" ry="7" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Linea verticale = meridiano -->
  <line x1="32" y1="14" x2="32" y2="50" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <!-- Punto = insight / highlight -->
  <circle cx="46" cy="22" r="4" fill="#ffffff"/>
</svg>
