# ============================================================================
# GSI — ambiente di SVILUPPO tramite Docker Compose.
#
# Servizi:
#   - postgres     : DB principale
#   - backend      : FastAPI con --reload (codice montato come volume)
#   - frontend     : Vite dev server con HMR
#   - ollama       : opzionale, attiva con:  docker compose --profile llm up
#
# Avvio rapido:
#   docker compose up --build -d
#
# Login admin:
#   admin@gsi.local / devpassword1234  (definita in ADMIN_PASSWORD qui sotto)
# ============================================================================

name: gsi-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: gsi-postgres
    environment:
      POSTGRES_DB: gsi
      POSTGRES_USER: gsi_user
      POSTGRES_PASSWORD: gsi_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsi_user -d gsi"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gsi-backend
    environment:
      ENV: development
      DATABASE_URL: postgresql+psycopg://gsi_user:gsi_pass@postgres:5432/gsi
      SECRET_KEY: dev-secret-key-do-not-use-in-prod-aaaaaaaaaa
      WP_ENCRYPTION_KEY: dev-wp-fernet-key-do-not-use-in-prod
      ADMIN_EMAIL: admin@gsi.local
      ADMIN_PASSWORD: devpassword1234
      CORS_ORIGINS: '["http://localhost:5173"]'
      UPLOAD_DIR: /app/uploads
      UNSPLASH_ACCESS_KEY: ""
      # Per la LLM second-opinion (se profile llm è attivo):
      # OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      # Il venv dell'host non deve finire nel container:
      - /app/venv
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gsi-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      # Dev proxy Vite (/api, /uploads) → target backend. In Docker compose
      # il servizio backend e' raggiungibile via DNS "backend:8000";
      # in dev nativo (npm run dev fuori Docker) il default localhost:8000
      # del vite.config.ts va bene.
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      # Volume NOMINATO (non anonimo): cosi' possiamo rimuoverlo con nome
      # pulito — `docker volume rm gsi-dev_frontend_node_modules` — quando
      # cambia package.json (nuove dipendenze aggiunte). Con volume anonimo
      # il container avrebbe riutilizzato i node_modules cached.
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  # Opzionale: abilita con `docker compose --profile llm up -d`
  ollama:
    profiles: ["llm"]
    image: ollama/ollama:latest
    container_name: gsi-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
  ollama_data:
  frontend_node_modules:
