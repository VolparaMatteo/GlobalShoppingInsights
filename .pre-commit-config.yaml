# ============================================================================
# Pre-commit hooks — eseguiti automaticamente prima di ogni `git commit`.
# Setup:
#   pip install pre-commit
#   pre-commit install
# Esecuzione manuale su tutto il repo:
#   pre-commit run --all-files
# Nota: mypy e pytest NON sono qui (troppo lenti) — girano in CI.
# ============================================================================

repos:
  # --- Igiene base ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # --- Backend: Ruff (lint + format) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # --- Frontend: Prettier ---
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/src/
        types_or: [ts, tsx, javascript, json, css, markdown]
        additional_dependencies:
          - prettier@3.3.3

  # --- Frontend: ESLint (hook locale, usa node_modules di frontend/) ---
  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        language: system
        entry: bash -c 'cd frontend && npm run lint'
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx)$
